{% extends 'base.html' %}
{% block title %}Đăng ký{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-3">Tạo tài khoản mới</h2>
        <form method="post" class="card card-body shadow-sm">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success">Đăng ký</button>
        </form>
    </div>
</div>
{% endblock %}
