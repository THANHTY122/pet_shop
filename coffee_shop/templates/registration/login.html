{% extends 'base.html' %}
{% block title %}Đăng nhập{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-3">Đăng nhập</h2>
        <form method="post" class="card card-body shadow-sm">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">Đăng nhập</button>
        </form>
    </div>
</div>
{% endblock %}
